name: AEGIS CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  aegis-scan:
    name: Secret and IP scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install AEGIS
        run: npm install -g @kshitizz36/aegis

      - name: Scan changed files
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            CHANGED=$(git diff --name-only "origin/${{ github.base_ref }}"...HEAD)
          else
            CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || git diff --name-only HEAD)
          fi

          FOUND_BLOCKING=0

          for file in $CHANGED; do
            if [ -f "$file" ]; then
              result=$(aegis check --json "$file" 2>&1 || true)
              echo "$result" | python3 -m json.tool || echo "$result"

              python3 - "$file" <<'PY' <<<"$result"
import json
import sys

path = sys.argv[1]
data = json.load(sys.stdin)
for finding in data.get("findings", []):
    tier = str(finding.get("tier", "unknown"))
    desc = str(finding.get("description", "AEGIS finding"))
    line = finding.get("line")
    location = f"{path}:{line}" if line else path
    level = "error" if tier in {"T0", "T1"} else "warning"
    print(f"::{level} file={path},line={line or 1},title=AEGIS {tier}::{location} {desc}")
PY

              has_blocking=$(python3 - <<'PY' <<<"$result"
import json
import sys

data = json.load(sys.stdin)
print("true" if any(str(f.get("tier", "")) in {"T0", "T1"} for f in data.get("findings", [])) else "false")
PY
)

              if [ "$has_blocking" = "true" ]; then
                FOUND_BLOCKING=1
              fi
            fi
          done

          if [ "$FOUND_BLOCKING" -ne 0 ]; then
            echo "::error::AEGIS detected a blocking secret or IP leak."
            exit 1
          fi
